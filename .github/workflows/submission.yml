name: Submission release gate

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  evaluator-rehearsal:
    runs-on: ubuntu-latest
    env:
      OPENBLAS_NUM_THREADS: "1"
      OMP_NUM_THREADS: "1"
      MKL_NUM_THREADS: "1"
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - name: Install only pinned evaluator dependencies
        run: python -m pip install --requirement requirements.txt
      - name: Verify protected release layout
        run: python -m product.scripts.release_check --strict
      - name: Run unit and regression tests
        run: python -m unittest discover -s product/tests -q
      - name: Execute the exact evaluator command
        run: ./run.sh ./data ./pickle/model.pkl ./output/predictions.csv
      - name: Verify locked horizon-v1 output contract
        run: python -m product.scripts.verify_evaluator_contract --predictions ./output/predictions.csv
